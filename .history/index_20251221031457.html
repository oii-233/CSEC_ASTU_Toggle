<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Room</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <model-viewer 
            id="roomModel"
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
            alt="A 3D Room Model"
            auto-rotate
            camera-controls
            exposure="0.1" 
            shadow-intensity="1">
        </model-viewer>

        <div class="controls">
            <h1 id="statusText">Power: OFF</h1>
            <button id="toggleBtn">Switch Light ON</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
